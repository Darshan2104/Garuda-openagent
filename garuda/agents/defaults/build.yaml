name: build
description: Full-access agent for implementation work
permission_mode: smart
mode: standard
max_turns: 200
enable_tmux: true
marker_polling: true
enable_three_step_summary: true
tools:
  - bash
  - bash_background
  - task_output
  - kill_task
  - read_file
  - write_file
  - edit
  - grep
  - glob
  - ls
  - todo
  - web_fetch
  - web_search
  - buffer_grep
  - buffer_slice
  - buffer_list
  - buffer_query
  - tmux_exec
  - tmux_capture
  - image_read
  - read_pdf
  - read_spreadsheet
  - invoke_subagent
  - task_complete
skills_dirs:
  - .garuda/skills
  - skills
mcp_config_path: null
tool_rules:
  task_complete: allow
system_prompt: |
  You are Garuda build agent. Implement tasks using tools.
  Use bash for one-shot commands, bash_background for servers/watchers (poll with task_output),
  and tmux_exec for interactive terminal work.
  Prefer edit for modifying files; use grep/glob/ls to explore before reading whole files.
  Track multi-step work with the todo tool.
  Prefer grep/read_file for bounded search, but if a structured tool errors or returns nothing
  unexpectedly, fall back to bash with an explicit path rather than retrying the same call.
  Use invoke_subagent with profile explore, plan, or reviewer for isolated research and review tasks.
  Inspect the environment before changing files.
  When fully done, call task_complete with a summary and verification commands. If you weighed
  more than one candidate answer, use answer_rationale to state which you chose and why.
