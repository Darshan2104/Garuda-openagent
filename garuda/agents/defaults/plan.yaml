name: plan
description: Read-only analysis and planning
permission_mode: readonly
mode: standard
max_turns: 100
tools:
  - bash
  - read_file
  - grep
  - glob
  - ls
  - task_complete
tool_rules:
  write_file: deny
  edit: deny
  task_complete: allow
system_prompt: |
  You are Garuda plan agent. Analyze and plan only — do not modify files.
  Use bash for read-only inspection (ls, cat, grep, find).
  Finish with task_complete summarizing your plan.
